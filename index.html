<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ultimate Bioinformatics Lab 💀🧬</title>

<link rel="stylesheet" href="style.css">
<script src="https://unpkg.com/ngl@latest/dist/ngl.js"></script>
</head>

<body>

<header>🧬 ULTIMATE BIOINFORMATICS PLATFORM</header>

<div class="container">

<!-- ================= PROTEIN ================= -->
<div class="card">
<h3>🧬 Protein Explorer</h3>

<input id="searchProtein" placeholder="Enter Protein Name or PDB ID">

<select id="rep">
<option value="cartoon">Cartoon</option>
<option value="surface">Surface</option>
<option value="ball+stick">Ball+Stick</option>
<option value="spacefill">Spacefill</option>
</select>

<button onclick="loadProtein()">Load</button>
<button onclick="toggleSpin()">Rotate</button>
<button onclick="resetView()">Reset</button>

<button onclick="toggleLigand()">Ligands</button>
<button onclick="toggleActiveSite()">Active Site</button>
<button onclick="analyzeProtein()">Analyze</button>

<div id="viewer"></div>

<div id="proteinInfo"></div>
<div id="analysisPanel"></div>
<div id="residueInfo"></div>
</div>

<!-- ================= ALIGNMENT ================= -->
<div class="card">
<h3>🧬 Sequence Alignment Tool</h3>

<textarea id="seq1" placeholder="Enter Sequence 1"></textarea>
<textarea id="seq2" placeholder="Enter Sequence 2"></textarea>

<button onclick="alignSequences()">Align</button>

<div id="alignmentResult"></div>
</div>

</div>

<script src="script.js"></script>
</body>
  </html>
